<svg xmlns="http://www.w3.org/2000/svg" width="700" height="50" viewBox="0 0 700 50" role="img" aria-label="Cycling tagline">
  <style>
    .l { font-family: 'Fira Code', 'Courier New', ui-monospace, monospace; font-size: 22px; fill: #F5A623; opacity: 0; font-weight: 500; }
  </style>

  <text x="350" y="32" text-anchor="middle" class="l">I turn business problems into production software
    <animate attributeName="opacity"
             values="0;1;1;0;0"
             keyTimes="0;0.05;0.18;0.20;1"
             dur="20s" repeatCount="indefinite"/>
  </text>

  <text x="350" y="32" text-anchor="middle" class="l">Next.js · Python · Claude API · MCP SDK
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.20;0.25;0.38;0.40;1"
             dur="20s" repeatCount="indefinite"/>
  </text>

  <text x="350" y="32" text-anchor="middle" class="l">Shipped pdf-edit-engine to PyPI
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.40;0.45;0.58;0.60;1"
             dur="20s" repeatCount="indefinite"/>
  </text>

  <text x="350" y="32" text-anchor="middle" class="l">38-tool MCP server for format-preserving PDF editing
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.60;0.65;0.78;0.80;1"
             dur="20s" repeatCount="indefinite"/>
  </text>

  <text x="350" y="32" text-anchor="middle" class="l">Find the real problem, build what actually fixes it
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.80;0.85;0.98;1"
             dur="20s" repeatCount="indefinite"/>
  </text>
</svg>
