name: Generate Metrics

on:
  # Schedule disabled — workflow currently fails in CI for unknown reason
  # (lowlighter/metrics action exits non-zero even with minimal config; needs
  # debugging from a machine with workflow log access). Re-enable the cron
  # once the failure mode is identified and fixed.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate metrics SVG (baseline — plugins TBD)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AryanBV
          filename: metrics.svg
          output_action: none
          base: header
          config_timezone: Asia/Kolkata
          # TODO: re-enable plugins once they can be debugged with workflow log access:
          #   plugin_isocalendar (3D contribution calendar)
          #   plugin_languages (replaces top-langs card)
          #   plugin_achievements (GitHub achievement badges)
          # All three failed silently in CI — likely needs PAT with extra scopes
          # or the action is incompatible with the runner environment.

      - name: Stage SVG
        run: |
          ls -la
          mkdir -p dist
          if [ -f metrics.svg ]; then
            mv metrics.svg dist/metrics.svg
            echo "OK: $(stat -c%s dist/metrics.svg) bytes"
          else
            echo "FAIL: metrics.svg not produced"
            exit 1
          fi

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update metrics [skip ci]"
