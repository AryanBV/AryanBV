name: Generate Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main]
    paths:
      - '.github/workflows/metrics.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Generate metrics SVG
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AryanBV
          filename: metrics.svg
          committer_branch: output
          committer_message: "chore: update metrics [skip ci]"

          base: header
          base_indepth: yes
          config_order: base.header, isocalendar, languages
          config_timezone: Asia/Kolkata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css, scss, less, dockerfile, makefile, shell, tex

          extras_css: |
            /* canvas */
            svg { background: #0A0A0A !important; }

            /* HTML text inside foreignObject — overrides lowlighter defaults */
            h1, h2, h3 { color: #F5A623 !important; }
            section, .field, div { color: #F5F5F5 !important; }

            /* SVG text */
            text, tspan { fill: #F5F5F5 !important; }
            a, a text, a tspan { fill: #F5A623 !important; }

            /* hide ONLY the "Followed by N users" field by matching its
               unique SVG icon path (user-with-followers icon) */
            div.field:has(svg path[d^="M5.5 3.5a2 2"]) { display: none !important; }

            /* recolor GitHub default green calendar to amber palette */
            [fill="#ebedf0"] { fill: #171513 !important; }
            [fill="#9be9a8"] { fill: #5A3F1F !important; }
            [fill="#40c463"] { fill: #B27512 !important; }
            [fill="#30a14e"] { fill: #F5A623 !important; }
            [fill="#216e39"] { fill: #FF6B35 !important; }
