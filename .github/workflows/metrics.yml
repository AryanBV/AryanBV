name: Generate Metrics

on:
  schedule:
    - cron: "0 2 * * *"           # daily at 02:00 UTC
  workflow_dispatch:
  push:
    branches: [ claude/update-readme-info-zOLNp ]   # TEMPORARY: bootstrap run; removed before merge to main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate composite metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: AryanBV
          filename: metrics.svg
          output_action: none
          base: header, community, repositories, metadata
          config_timezone: Asia/Kolkata
          plugin_isocalendar: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_lines: yes

      - name: Stage SVG
        run: |
          ls -la
          mkdir -p dist
          if [ -f metrics.svg ]; then
            mv metrics.svg dist/metrics.svg
            echo "Staged metrics.svg ($(stat -c%s dist/metrics.svg) bytes)"
          else
            echo "ERROR: metrics.svg was not generated"
            ls -la
            exit 1
          fi

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update metrics [skip ci]"
