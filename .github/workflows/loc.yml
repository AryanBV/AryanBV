name: Generate LOC Stats

on:
  schedule:
    - cron: "0 3 * * *"
  push:
    branches: [main]
    paths:
      - '.github/workflows/loc.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  loc:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute total LOC across owned public repos
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            const user = 'AryanBV';

            // List all owned non-fork public repos (paginated)
            const repos = await github.paginate(
              github.rest.repos.listForUser,
              { username: user, per_page: 100, type: 'owner' }
            );
            const owned = repos.filter(r => !r.fork && !r.archived);
            console.log(`Found ${owned.length} owned non-fork repos`);

            // Aggregate bytes per language via GitHub Languages API
            const totals = {};
            for (const repo of owned) {
              try {
                const { data: langs } = await github.rest.repos.listLanguages({
                  owner: user, repo: repo.name,
                });
                for (const [lang, bytes] of Object.entries(langs)) {
                  totals[lang] = (totals[lang] || 0) + bytes;
                }
              } catch (e) {
                console.log(`Skipped ${repo.name}: ${e.message}`);
              }
            }

            // Filter out non-code "languages" that GitHub counts but inflate LOC
            const filterOut = new Set([
              'HTML', 'CSS', 'SCSS', 'Less', 'Sass',
              'Jupyter Notebook', 'Dockerfile', 'Makefile',
              'Shell', 'Batchfile', 'PowerShell',
              'TeX', 'Roff', 'Smarty',
            ]);
            const codeBytes = Object.entries(totals)
              .filter(([lang]) => !filterOut.has(lang))
              .reduce((sum, [, b]) => sum + b, 0);

            // Estimate lines: ~30 bytes/line is a reasonable industry rough avg
            // (Python: ~25, TS/JS: ~35-45, C++/Java: ~30-40 — 30 splits the diff)
            const estimatedLoc = Math.floor(codeBytes / 30);
            const formatted = estimatedLoc.toLocaleString('en-US');

            const dist = path.join(process.env.GITHUB_WORKSPACE, 'dist');
            fs.mkdirSync(dist, { recursive: true });

            // Shields.io endpoint badge JSON
            fs.writeFileSync(
              path.join(dist, 'loc.json'),
              JSON.stringify({
                schemaVersion: 1,
                label: 'lines of code',
                message: formatted,
                color: 'F5A623',
                labelColor: '0A0A0A',
                style: 'for-the-badge',
              })
            );

            // Debug breakdown
            const sortedLangs = Object.entries(totals).sort((a, b) => b[1] - a[1]);
            fs.writeFileSync(
              path.join(dist, 'loc-breakdown.json'),
              JSON.stringify({
                user,
                generated_at: new Date().toISOString(),
                owned_repos: owned.length,
                total_bytes_all: Object.values(totals).reduce((a, b) => a + b, 0),
                code_bytes: codeBytes,
                estimated_loc: estimatedLoc,
                by_language: Object.fromEntries(sortedLangs),
              }, null, 2)
            );

            console.log(`OK: ${owned.length} repos, ${codeBytes.toLocaleString()} code bytes, ~${formatted} lines`);

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update LOC stats [skip ci]"
