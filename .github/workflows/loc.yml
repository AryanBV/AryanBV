name: Generate LOC Stats

on:
  schedule:
    - cron: "30 */6 * * *"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  loc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install cloc
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cloc

      - name: Compute exact LOC across all owned non-fork repos
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');
            const user = 'AryanBV';

            // List owned non-fork non-archived public repos
            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: user, per_page: 100, type: 'owner'
            });
            const owned = repos.filter(r => !r.fork && !r.archived);
            console.log(`Found ${owned.length} owned non-fork repos`);

            // Clone each shallow + token-auth (for private if any later)
            const tmpDir = '/tmp/loc-workspace';
            execSync(`mkdir -p ${tmpDir}`);
            const cloned = [];
            for (const repo of owned) {
              const url = repo.clone_url.replace(
                'https://',
                `https://x-access-token:${process.env.GH_TOKEN}@`
              );
              const target = path.join(tmpDir, repo.name);
              try {
                execSync(
                  `git clone --depth 1 --no-tags --quiet "${url}" "${target}"`,
                  { stdio: ['ignore', 'ignore', 'pipe'] }
                );
                cloned.push(repo.name);
              } catch (e) {
                console.log(`Skipped ${repo.name}: clone failed`);
              }
            }
            console.log(`Cloned ${cloned.length}/${owned.length} repos`);

            // Run cloc on the workspace.
            // Exclude common vendor/build/cache dirs + lock files.
            const excludeDirs = [
              'node_modules', 'dist', 'build', 'vendor', 'coverage',
              '.next', '__pycache__', 'target', 'bin', 'obj',
              'venv', 'env', '.venv', '.nuxt', '.cache', '.docusaurus',
              '.vercel', '.firebase', 'site-packages', 'out',
            ].join(',');

            const clocOutput = execSync(
              `cloc --json --quiet --exclude-dir=${excludeDirs} ` +
              `--not-match-f="(\\.min\\.|\\.bundle\\.|-lock\\.json$|yarn\\.lock$|pnpm-lock\\.yaml$|poetry\\.lock$|Pipfile\\.lock$)" ` +
              `--timeout=30 ${tmpDir}`,
              { encoding: 'utf-8', maxBuffer: 50 * 1024 * 1024 }
            );
            const cloc = JSON.parse(clocOutput);

            // Filter out non-code formats — "lines of code" should mean
            // actual programming languages, not data/config/markup.
            // JSON especially inflates (model weights, MCP tool catalogs,
            // package-lock variants, test fixtures).
            const nonCodeLangs = new Set([
              // Data & serialization
              'JSON', 'YAML', 'TOML', 'INI', 'Properties', 'CSV', 'TSV',
              // Docs & prose
              'Markdown', 'Text', 'Plain Text', 'AsciiDoc', 'reStructuredText',
              // Markup
              'XML', 'SVG', 'HTML', 'XHTML',
              // Styling (markup, not algorithmic code)
              'CSS', 'SCSS', 'Sass', 'Less', 'Stylus',
              // Build / infra
              'Maven', 'Gradle', 'CMake', 'make', 'Makefile',
              'Dockerfile', 'DOS Batch', 'MSBuild script',
              // Mixed / notebooks
              'Jupyter Notebook',
            ]);

            const langs = {};        // programming-language LOC only
            const allLangs = {};     // everything for the breakdown
            for (const [key, val] of Object.entries(cloc)) {
              if (key === 'header' || key === 'SUM') continue;
              if (typeof val !== 'object' || !val.code) continue;
              allLangs[key] = val.code;
              if (!nonCodeLangs.has(key)) langs[key] = val.code;
            }

            const total = Object.values(langs).reduce((a, b) => a + b, 0);
            const sortedLangs = Object.entries(langs)
              .sort((a, b) => b[1] - a[1]);
            const [topLang, topLoc] = sortedLangs[0] || ['—', 0];
            const topPct = total > 0
              ? ((topLoc / total) * 100).toFixed(1)
              : '0.0';
            const fmt = n => n.toLocaleString('en-US');

            const dist = path.join(process.env.GITHUB_WORKSPACE, 'dist');
            fs.mkdirSync(dist, { recursive: true });

            // Total LOC badge
            fs.writeFileSync(path.join(dist, 'loc.json'), JSON.stringify({
              schemaVersion: 1,
              label: 'lines of code',
              message: fmt(total),
              color: 'F5A623',
              labelColor: '0A0A0A',
              style: 'for-the-badge',
            }));

            // Top language badge
            fs.writeFileSync(path.join(dist, 'loc-top-language.json'), JSON.stringify({
              schemaVersion: 1,
              label: `top: ${topLang.toLowerCase()}`,
              message: `${fmt(topLoc)} (${topPct}%)`,
              color: 'F5A623',
              labelColor: '0A0A0A',
              style: 'for-the-badge',
            }));

            // Full breakdown for transparency / debugging
            fs.writeFileSync(path.join(dist, 'loc-breakdown.json'), JSON.stringify({
              user,
              generated_at: new Date().toISOString(),
              method: 'cloc on shallow-cloned repos; programming languages only (data/config/markup excluded)',
              owned_repos: owned.length,
              cloned_repos: cloned.length,
              total_loc: total,
              top_language: topLang,
              top_loc: topLoc,
              top_percentage: parseFloat(topPct),
              by_language: Object.fromEntries(sortedLangs),
              all_languages_including_non_code: allLangs,
              cloc_header: cloc.header,
              cloc_sum: cloc.SUM,
            }, null, 2));

            console.log(`Total: ${fmt(total)} lines | Top: ${topLang} ${fmt(topLoc)} (${topPct}%)`);

            // Generate languages.svg — accurate language breakdown bar chart
            // using real cloc data. Replaces lowlighter/metrics' plugin_languages
            // which was inflated/misleading.
            const top5 = sortedLangs.slice(0, 5);
            const colors = ['#F5A623', '#FF6B35', '#B27512', '#8B5A1F', '#5A3F1F'];
            const svgWidth = 720;
            const barRowHeight = 36;
            const headerHeight = 76;
            const barMaxWidth = 380;
            const labelX = 24;
            const barX = 170;
            const numX = barX + barMaxWidth + 14;
            const totalHeight = headerHeight + top5.length * barRowHeight + 22;

            let svgRows = '';
            top5.forEach(([lang, loc], idx) => {
              const pct = total > 0 ? (loc / total) * 100 : 0;
              const y = headerHeight + idx * barRowHeight;
              const barWidth = Math.max(barMaxWidth * (pct / 100), 4);
              const textY = y + 19;
              svgRows += `
              <text x="${labelX}" y="${textY}" fill="#F5F5F5" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="15" font-weight="500">${lang}</text>
              <rect x="${barX}" y="${y + 6}" width="${barWidth.toFixed(1)}" height="24" fill="${colors[idx]}" rx="4"/>
              <text x="${numX}" y="${textY}" fill="#F5F5F5" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">${pct.toFixed(1)}% &#183; ${fmt(loc)}</text>`;
            });

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${svgWidth} ${totalHeight}" width="${svgWidth}" role="img" aria-label="Top languages by lines of code">
              <rect width="${svgWidth}" height="${totalHeight}" fill="#0A0A0A" rx="10"/>
              <text x="${labelX}" y="36" fill="#F5A623" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="18" font-weight="600">Most used languages</text>
              <text x="${labelX}" y="58" fill="#A09888" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">${fmt(total)} lines across ${cloned.length} owned public repos &#183; counted by cloc</text>${svgRows}
            </svg>`;

            fs.writeFileSync(path.join(dist, 'languages.svg'), svg);

            // Cleanup
            execSync(`rm -rf ${tmpDir}`);

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update LOC stats [skip ci]"
