name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours
  workflow_dispatch:          # allows manual trigger from Actions tab

permissions:
  contents: write             # REQUIRED: allows pushing SVGs to the output branch

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=F5A623&color_dots=171513,5A3F1F,B27512,F5A623,FF6B35
            dist/github-contribution-grid-snake-dark.svg?color_snake=F5A623&color_dots=171513,5A3F1F,B27512,F5A623,FF6B35
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          keep_files: true
          commit_message: "chore: update snake animation [skip ci]"
